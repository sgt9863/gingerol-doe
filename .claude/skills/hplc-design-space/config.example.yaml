# config.example.yaml
# 使い方：このファイルを config.yaml にコピーし、実際の値に書き換えて使う。
# 変わる部分（因子範囲・ピーク定義・カラム情報・合格条件・実験設計）をここに集約。
# 固定ロジックは scripts/ に置く（このファイルを変えるだけで別化合物に転用できる）。

# ──────────────────────────────
# ピーク定義
# ──────────────────────────────
peaks:
  target: TP                  # 目的ピーク名
  interfering: [IP1, IP2]     # 夾雑ピーク名（溶出順不問。クロスオーバー対応済み）
  elution_order_nominal:      # 現行条件（中水準）での溶出順（モデルの初期値チェック用）
    - IP1
    - TP
    - IP2

# ──────────────────────────────
# カラム情報
# ──────────────────────────────
column:
  name: "Waters ACQUITY UPLC BEH C8"
  length_mm: 100              # カラム長 [mm]
  id_mm: 2.1                  # 内径 [mm]
  dp_um: 1.7                  # 粒径 [µm]
  porosity: 0.66              # 全空隙率（Waters 推奨の概算値。BEH 全多孔性粒子）
  Vm_mL: 0.23                 # カラム死容量 [mL]（幾何推算: 0.66 × π r² L ≈ 0.229）
                              # 厳密化: 不保持物質(ウラシル等)を注入し Vm = t0 × F で実測
  peak_width_definition: half_height  # ピーク幅の定義（半値幅 W_h）
                                      # 理論段数換算: N = 5.54 × (t_R / W_h)²

# ──────────────────────────────
# 実験因子の範囲（探索範囲）
# ──────────────────────────────
# 中水準は現行条件より低温・高ACN側にシフト（現行: T=75℃ / phi=0.40 / F=0.6）
# F の水準は t_R = Vm*(1+k)/F の反比例から計算。
#   実測後の更新式: F_low = Vm*(1+k_center)/tR_high, F_high = Vm*(1+k_center)/tR_low
# 既定値は実測 Day1 CCD（data/demo_runs.csv）の設計範囲（±1 水準）に合わせてある。
# → ②解析タブの初期因子範囲がデモと一致する。別化合物では自分の設計範囲に書き換える。
factors:
  T:
    low: 45          # [°C]
    center: 50       # [°C]  中水準
    high: 55         # [°C]
    unit: "degC"
  phi:
    low: 0.42        # ACN 体積分率（= 42% ACN）
    center: 0.45     # ACN 体積分率（= 45% ACN）
    high: 0.48       # ACN 体積分率（= 48% ACN）
    unit: "ACN_fraction"
  F:
    low: 0.55        # [mL/min]
    center: 0.60     # [mL/min]
    high: 0.65       # [mL/min]
    unit: "mL_per_min"

# ──────────────────────────────
# デザインスペースの合格条件
# ──────────────────────────────
acceptance_criteria:
  Rs_min: 2.0        # min{Rs1, Rs2} の下限（ICH Q8 ベース）
  tR_TP_max: 7.5     # 目的ピーク TP の保持時間の上限 [分]（TP固有の分析時間制約）
  tR_last_max: null  # 最遅ピークの上限 [分]。これは「データ取り段階の洗浄前制約」であって
                     # デザインスペースの合否ではないため既定は null（不使用）。
                     # データ取り時の運用制約として課したい場合のみ数値（例 10.0）を入れる。

# ──────────────────────────────
# 実験計画（DoE）の設定
# ──────────────────────────────
design:
  day1:
    type: ccd              # 中心複合計画（Central Composite Design）
    center_points: 6       # 中心点繰り返し数（純誤差推定・湾曲検定用、自由度5）
    # 合計: 頂点 2³=8 + 軸上点 6 + 中心点 6 = 20 本
  day2:
    type: d_optimal        # D 最適（情報が薄い領域を狙い打ち）
    bridge_center_points: 3  # Day2 冒頭に入れる中心点（Day1↔Day2 の日間差橋渡し用）
  blocking: true           # 別日実施 → 日間変動をブロック項で補正
                           # モデル: ln k = a + b/T + c·φ + δ·day
  budget_per_day: 50       # 1日あたり実験本数の上限
  run_time_min: 22         # 1注入あたりの所要時間 [分]（洗浄込み）

# ──────────────────────────────
# 入出力
# ──────────────────────────────
io:
  input_excel: data/runs.xlsx   # 実測データ（各条件の T/phi/F/day と3ピークの t_R・W_h）
  output_dir: outputs           # 推奨条件・3D html・フィット残差を出力するフォルダ
